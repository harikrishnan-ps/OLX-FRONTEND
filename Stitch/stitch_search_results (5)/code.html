<!DOCTYPE html><html class="light" lang="en"><head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0" name="viewport">
<title>Registration - OLX</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&amp;display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">

      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "tertiary-fixed": "#ffdcc4",
                    "inverse-primary": "#a5ced4",

                    "outline": "#717879",
                    "on-primary-container": "#70989d",
                    "primary-fixed": "#c1eaf0",
                    "on-tertiary-fixed-variant": "#603f25",
                    "on-error": "#ffffff",
                    "surface-variant": "#e2e2e2",
                    "on-error-container": "#93000a",
                    "surface-tint": "#3d646a",
                    "on-secondary-container": "#fefcff",
                    "surface": "#f9f9f9",
                    "surface-bright": "#f9f9f9",
                    "on-primary": "#ffffff",
                    "error": "#ba1a1a",
                    "outline-variant": "#c0c8c9",
                    "on-secondary": "#ffffff",
                    "surface-dim": "#dadada",
                    "on-background": "#1a1c1c",
                    "on-secondary-fixed-variant": "#003fa4",
                    "tertiary-container": "#3f230b",
                    "on-tertiary-fixed": "#2e1501",
                    "surface-container-high": "#e8e8e8",
                    "tertiary-fixed-dim": "#edbd9a",
                    "secondary-container": "#2a6bf3",
                    "primary": "#00191c",
                    "error-container": "#ffdad6",
                    "primary-container": "#002f34",
                    "tertiary": "#260f00",
                    "inverse-on-surface": "#f1f1f0",
                    "inverse-surface": "#2f3131",
                    "on-primary-fixed": "#001f23",
                    "on-surface-variant": "#414849",
                    "on-secondary-fixed": "#001849",
                    "on-primary-fixed-variant": "#254d52",
                    "primary-fixed-dim": "#a5ced4",
                    "on-tertiary-container": "#b38869",
                    "surface-container": "#eeeeee",
                    "secondary-fixed": "#dae1ff",
                    "surface-container-highest": "#e2e2e2",
                    "on-tertiary": "#ffffff",
                    "surface-container-lowest": "#ffffff",
                    "secondary": "#0052d1",
                    "surface-container-low": "#f3f3f3"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "spacing": {
                    "card-padding": "16px",
                    "container-max-width": "1280px",
                    "grid-gutter": "16px",
                    "navbar-height": "72px",
                    "navbar-height-mobile": "64px",
                    "section-padding": "32px"
            },
            "fontFamily": {
                    "headline-lg": [
                            "Inter"
                    ],
                    "label-bold": [
                            "Inter"
                    ],
                    "headline-md": [
                            "Inter"
                    ],
                    "headline-lg-mobile": [
                            "Inter"
                    ],
                    "price-display": [
                            "Inter"
                    ],
                    "label-sm": [

                    ],
                    "display-lg": [

                    ],
                    "body-sm": [

            "fontSize": {

                    ],

                    ],
                    "label-sm": [

        },
      }

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .material-symbols-outlined[data-weight="fill"] {
            font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        
        /* Subtle animation for step transition */
        .step-transition {
            transition: all 0.3s ease-in-out;
        }
    </style>
</head>
<body class="bg-background text-on-background font-body-lg min-h-screen flex flex-col items-center justify-center p-4">
<!-- Main Registration Container -->
<div class="w-full max-w-lg bg-surface-container-lowest rounded-xl shadow-md border border-outline-variant overflow-hidden">
<!-- Header -->
<div class="p-6 border-b border-outline-variant flex items-center justify-between bg-surface">
<div>
<h1 class="font-headline-md text-headline-md text-primary">Join OLX</h1>
<p class="font-body-sm text-body-sm text-on-surface-variant mt-1">Create your account to start trading.</p>
</div>
<span class="material-symbols-outlined text-primary text-3xl" data-icon="storefront" data-weight="fill">storefront</span>
</div>
<!-- Step Indicator -->
<div class="px-6 pt-6 pb-2">
<div class="flex items-center justify-between relative">
<div class="absolute left-0 top-1/2 -translate-y-1/2 w-full h-1 bg-surface-variant -z-10 rounded-full"></div>
<!-- Step 1 Active -->
<div class="flex flex-col items-center gap-1">
<div class="w-8 h-8 rounded-full bg-primary-container text-on-primary text-label-bold font-label-bold flex items-center justify-center shadow-sm">1</div>
<span class="text-label-sm font-label-sm text-primary">Details</span>
</div>
<!-- Step 2 Inactive -->
<div class="flex flex-col items-center gap-1">
<div class="w-8 h-8 rounded-full bg-surface-variant text-on-surface-variant text-label-bold font-label-bold flex items-center justify-center">2</div>
<span class="text-label-sm font-label-sm text-on-surface-variant">Verify</span>
</div>
<!-- Step 3 Inactive -->
<div class="flex flex-col items-center gap-1">
<div class="w-8 h-8 rounded-full bg-surface-variant text-on-surface-variant text-label-bold font-label-bold flex items-center justify-center">3</div>
<span class="text-label-sm font-label-sm text-on-surface-variant">Done</span>
</div>
</div>
</div>
<!-- Form Content -->
<div class="p-6">
<form action="#" class="flex flex-col gap-5" method="POST">
<!-- Full Name -->
<div class="flex flex-col gap-1.5">
<label class="font-label-bold text-label-bold text-on-surface" for="fullName">Full Name</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-on-surface-variant" data-icon="person">person</span>
<input class="w-full pl-10 pr-4 py-3 bg-surface-container-lowest border border-outline-variant rounded-lg font-body-lg text-body-lg text-on-surface focus:border-secondary focus:ring-1 focus:ring-secondary focus:outline-none transition-colors" id="fullName" name="fullName" placeholder="John Doe" required="" type="text">
</div>
</div>
<!-- Email -->
<div class="flex flex-col gap-1.5">
<label class="font-label-bold text-label-bold text-on-surface" for="email">Email Address</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-on-surface-variant" data-icon="mail">mail</span>
<input class="w-full pl-10 pr-4 py-3 bg-surface-container-lowest border border-outline-variant rounded-lg font-body-lg text-body-lg text-on-surface focus:border-secondary focus:ring-1 focus:ring-secondary focus:outline-none transition-colors" id="email" name="email" placeholder="john@example.com" required="" type="email">
</div>
</div>
<!-- Phone Number -->
<div class="flex flex-col gap-1.5">
<label class="font-label-bold text-label-bold text-on-surface" for="phone">Phone Number</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-on-surface-variant" data-icon="call">call</span>
<input class="w-full pl-10 pr-4 py-3 bg-surface-container-lowest border border-outline-variant rounded-lg font-body-lg text-body-lg text-on-surface focus:border-secondary focus:ring-1 focus:ring-secondary focus:outline-none transition-colors" id="phone" name="phone" placeholder="+1 (555) 000-0000" required="" type="tel">
</div>
</div>
<!-- Password -->
<div class="flex flex-col gap-1.5">
<label class="font-label-bold text-label-bold text-on-surface" for="password">Password</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-on-surface-variant" data-icon="lock">lock</span>
<input class="w-full pl-10 pr-10 py-3 bg-surface-container-lowest border border-outline-variant rounded-lg font-body-lg text-body-lg text-on-surface focus:border-secondary focus:ring-1 focus:ring-secondary focus:outline-none transition-colors" id="password" name="password" placeholder="••••••••" required="" type="password">
<button class="absolute right-3 top-1/2 -translate-y-1/2 text-on-surface-variant hover:text-primary transition-colors focus:outline-none" type="button">
<span class="material-symbols-outlined" data-icon="visibility">visibility</span>
</button>
</div>
<p class="font-label-sm text-label-sm text-on-surface-variant mt-1">Must be at least 8 characters long.</p>
</div>
<!-- Terms and Conditions -->
<div class="flex items-start gap-3 mt-2">
<div class="flex items-center h-5">
<input class="w-4 h-4 text-primary-container bg-surface-container-lowest border-outline-variant rounded focus:ring-primary focus:ring-2" id="terms" name="terms" required="" type="checkbox">
</div>
<div class="text-sm">
<label class="font-body-sm text-body-sm text-on-surface-variant" for="terms">
                            I agree to the <a class="font-label-bold text-primary hover:underline" href="#">Terms of Use</a> and <a class="font-label-bold text-primary hover:underline" href="#">Privacy Policy</a>.
                        </label>
</div>
</div>
<!-- Actions -->
<div class="mt-6 pt-6 border-t border-outline-variant flex flex-col gap-3">
<button class="w-full bg-primary-container text-on-primary py-3 px-4 rounded-lg font-label-bold text-label-bold hover:bg-primary transition-colors shadow-sm flex items-center justify-center gap-2" type="submit">
                        Continue
                        <span class="material-symbols-outlined text-sm" data-icon="arrow_forward">arrow_forward</span>
</button>
<p class="text-center font-body-sm text-body-sm text-on-surface-variant mt-2">
                        Already have an account? <a class="font-label-bold text-primary hover:underline" href="#">Log in</a>
</p>
</div>
</form>
</div>
</div>


</body></html>
