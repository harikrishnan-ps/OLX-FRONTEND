<div class="auth-container">
  <div class="auth-card">
    <div class="auth-header">
      <h2>Verify OTP</h2>
      <p>Enter the OTP sent to {{ email }}</p>
    </div>

    <form [formGroup]="verifyForm" (ngSubmit)="onSubmit()" class="auth-form">
      <div class="form-group">
        <label for="otp">One Time Password</label>
        <div class="input-container">
          <input 
            type="text" 
            id="otp" 
            formControlName="otp" 
            placeholder="Enter OTP"
            [class.is-invalid]="verifyForm.get('otp')?.invalid && verifyForm.get('otp')?.touched"
          >
        </div>
        <div class="error-message" *ngIf="verifyForm.get('otp')?.invalid && verifyForm.get('otp')?.touched">
          <span *ngIf="verifyForm.get('otp')?.errors?.['required']">OTP is required</span>
          <span *ngIf="verifyForm.get('otp')?.errors?.['minlength']">OTP is too short</span>
        </div>
      </div>

      <div class="error-banner" *ngIf="errorMessage">
        {{ errorMessage }}
      </div>

      <button type="submit" class="btn btn-primary btn-block" [disabled]="verifyForm.invalid">
        Verify Account
      </button>

      <div class="auth-footer">
        <p>Didn't receive the code? <a href="javascript:void(0)" (click)="resendOtp()">Resend OTP</a></p>
      </div>
    </form>
  </div>
</div>
