<div class="auth-container">
  <div class="auth-card">
    <div class="auth-header">
      <h2>Reset Password</h2>
      <p>Enter the OTP sent to {{ email }} and your new password</p>
    </div>

    <form [formGroup]="resetForm" (ngSubmit)="onSubmit()" class="auth-form">
      <div class="form-group">
        <label for="otp">One Time Password</label>
        <div class="input-container">
          <input 
            type="text" 
            id="otp" 
            formControlName="otp" 
            placeholder="Enter OTP"
            [class.is-invalid]="resetForm.get('otp')?.invalid && resetForm.get('otp')?.touched"
          >
        </div>
        <div class="error-message" *ngIf="resetForm.get('otp')?.invalid && resetForm.get('otp')?.touched">
          <span *ngIf="resetForm.get('otp')?.errors?.['required']">OTP is required</span>
          <span *ngIf="resetForm.get('otp')?.errors?.['minlength']">OTP is too short</span>
        </div>
      </div>

      <div class="form-group">
        <label for="newPassword">New Password</label>
        <div class="input-container">
          <input 
            type="password" 
            id="newPassword" 
            formControlName="newPassword" 
            placeholder="Enter new password"
            [class.is-invalid]="resetForm.get('newPassword')?.invalid && resetForm.get('newPassword')?.touched"
          >
        </div>
        <div class="error-message" *ngIf="resetForm.get('newPassword')?.invalid && resetForm.get('newPassword')?.touched">
          <span *ngIf="resetForm.get('newPassword')?.errors?.['required']">Password is required</span>
          <span *ngIf="resetForm.get('newPassword')?.errors?.['minlength']">Password must be at least 8 characters long</span>
        </div>
      </div>

      <div class="error-banner" *ngIf="errorMessage">
        {{ errorMessage }}
      </div>

      <button type="submit" class="btn btn-primary btn-block" [disabled]="resetForm.invalid">
        Reset Password
      </button>
    </form>
  </div>
</div>
