<div class="auth-container">
  <div class="auth-card">
    <div class="auth-header">
      <h2>Forgot Password</h2>
      <p>Enter your email to receive a password reset code</p>
    </div>

    <form [formGroup]="forgotForm" (ngSubmit)="onSubmit()" class="auth-form">
      <div class="form-group">
        <label for="email">Email</label>
        <div class="input-container">
          <input 
            type="email" 
            id="email" 
            formControlName="email" 
            placeholder="Enter your email address"
            [class.is-invalid]="forgotForm.get('email')?.invalid && forgotForm.get('email')?.touched"
          >
        </div>
        <div class="error-message" *ngIf="forgotForm.get('email')?.invalid && forgotForm.get('email')?.touched">
          <span *ngIf="forgotForm.get('email')?.errors?.['required']">Email is required</span>
          <span *ngIf="forgotForm.get('email')?.errors?.['email']">Please enter a valid email address</span>
        </div>
      </div>

      <div class="success-banner" *ngIf="successMessage">
        {{ successMessage }}
      </div>
      <div class="error-banner" *ngIf="errorMessage">
        {{ errorMessage }}
      </div>

      <button type="submit" class="btn btn-primary btn-block" [disabled]="forgotForm.invalid">
        Send Reset Code
      </button>

      <div class="auth-footer">
        <p>Remembered your password? <a routerLink="/auth/login">Login</a></p>
      </div>
    </form>
  </div>
</div>
