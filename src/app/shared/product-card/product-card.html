<article class="product-card" [routerLink]="['/product', product.id]">
  <div class="product-card__image-wrapper">
    @if (hasImage) {
      <img
        class="product-card__image"
        [src]="product.images[0]"
        [alt]="product.title"
        loading="lazy"
      />
    } @else {
      <div class="product-card__image-placeholder">
        <span class="material-symbols-outlined">image</span>
      </div>
    }

    @if (product.featured) {
      <span class="product-card__featured-badge">Featured</span>
    }

    <button
      class="product-card__favorite-btn"
      (click)="onFavoriteClick($event)"
      [attr.aria-label]="product.isFavorited ? 'Remove from favorites' : 'Add to favorites'"
    >
      <span class="material-symbols-outlined" [class.fill]="product.isFavorited">favorite</span>
    </button>
  </div>

  <div class="product-card__content">
    <h3 class="product-card__price">${{ product.price | number }}</h3>
    <h4 class="product-card__title">{{ product.title }}</h4>

    <div class="product-card__footer">
      <span class="product-card__location">
        <span class="material-symbols-outlined">location_on</span>
        {{ displayLocation }}
      </span>
      <span class="product-card__time">{{ timeAgo }}</span>
    </div>
  </div>
</article>
