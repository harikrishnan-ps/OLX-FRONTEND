<aside class="filter-sidebar">
  <div class="filter-sidebar__header">
    <h2 class="text-headline-md">Filters</h2>
  </div>

  <div class="filter-section">
    <h3 class="filter-title">Price Range</h3>
    <div class="price-inputs">
      <input type="number" class="form-input" placeholder="Min" aria-label="Minimum price" [(ngModel)]="minPrice">
      <span>-</span>
      <input type="number" class="form-input" placeholder="Max" aria-label="Maximum price" [(ngModel)]="maxPrice">
    </div>
  </div>

  <div class="filter-section">
    <h3 class="filter-title">Condition</h3>
    <label class="checkbox-label">
      <input type="checkbox"> <span>Brand New</span>
    </label>
    <label class="checkbox-label">
      <input type="checkbox"> <span>Used - Like New</span>
    </label>
    <label class="checkbox-label">
      <input type="checkbox"> <span>Used - Good</span>
    </label>
    <label class="checkbox-label">
      <input type="checkbox"> <span>Used - Fair</span>
    </label>
  </div>

  <div class="filter-section">
    <h3 class="filter-title">Location</h3>
    <app-location-picker (locationChange)="onLocationChange($event)"></app-location-picker>
  </div>

  <div class="filter-actions">
    <button class="btn-primary" style="width: 100%;" (click)="applyFilters()">Apply Filters</button>
  </div>
</aside>
