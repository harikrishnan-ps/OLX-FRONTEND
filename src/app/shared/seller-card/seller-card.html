<div class="seller-card">
  <div class="seller-card__header">
    <div class="seller-card__avatar">
      @if (seller().avatar) {
        <img [src]="seller().avatar" [alt]="seller().name" />
      } @else {
        <span class="material-symbols-outlined">person</span>
      }
    </div>
    <div class="seller-card__info">
      <h3 class="seller-card__name">{{ seller().name }}</h3>
      <p class="seller-card__joined">Member since {{ seller().memberSince }}</p>
    </div>
  </div>

  @if (seller().rating) {
    <div class="seller-card__rating">
      <span class="material-symbols-outlined fill">star</span>
      <span class="rating-value">{{ seller().rating }}</span>
      <span class="rating-count">({{ seller().reviewCount }} reviews)</span>
    </div>
  }

  <div class="seller-card__actions">
    <button class="btn-primary">Chat with Seller</button>
  </div>
</div>
