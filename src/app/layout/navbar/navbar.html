<header class="navbar" role="banner">
  <nav class="navbar__inner" aria-label="Main navigation">
    <!-- Logo -->
    <a class="navbar__logo" [routerLink]="authService.currentUser()?.role?.toLowerCase() === 'admin' ? '/admin' : '/'" aria-label="OLX Home">OLX</a>

    <!-- Desktop Nav Links -->
    <div class="navbar__links hidden-mobile">
      @for (link of navLinks; track link.route) {
        <a class="navbar__link"
           [routerLink]="link.route"
           routerLinkActive="navbar__link--active">
          {{ link.label }}
        </a>
      }
    </div>

    <!-- Search Bar (Desktop) -->
    <div class="navbar__search hidden-mobile">
      <span class="material-symbols-outlined navbar__search-icon">search</span>
      <input
        type="text"
        class="navbar__search-input"
        placeholder="Search for anything..."
        aria-label="Search products"
        id="navbar-search-input"
      />
    </div>

    <!-- Desktop Action Buttons -->
    <div class="navbar__actions hidden-mobile">
      @for (btn of iconButtons; track btn.icon) {
        <a class="navbar__icon-btn"
           [routerLink]="btn.route"
           routerLinkActive="navbar__icon-btn--active"
           [attr.aria-label]="btn.label">
          <span class="material-symbols-outlined">{{ btn.icon }}</span>
        </a>
      }

      @if (authService.isAuthenticated()) {
        <a class="navbar__link" style="font-weight: bold;" routerLink="/profile">Profile</a>
        <a class="navbar__link" style="font-weight: bold; cursor: pointer;" (click)="logout()">Logout</a>
      } @else {
        <a class="navbar__link" style="font-weight: bold;" routerLink="/auth/login">Login</a>
        <a class="navbar__link" style="font-weight: bold;" routerLink="/auth/register">Register</a>
      }

      <a class="btn-sell-rounded" routerLink="/post-ad" id="navbar-sell-btn">
        <span class="material-symbols-outlined" style="font-size: 16px;">add</span>
        Sell
      </a>
    </div>

    <!-- Mobile Hamburger -->
    <button class="navbar__hamburger hidden-desktop"
            (click)="toggleMobileMenu()"
            [attr.aria-expanded]="mobileMenuOpen()"
            aria-label="Toggle menu"
            id="navbar-hamburger-btn">
      <span class="material-symbols-outlined">
        {{ mobileMenuOpen() ? 'close' : 'menu' }}
      </span>
    </button>
  </nav>
</header>

<!-- Mobile Bottom Nav Bar -->
<nav class="bottom-nav hidden-desktop" aria-label="Mobile navigation">
  <a class="bottom-nav__item" [routerLink]="authService.currentUser()?.role?.toLowerCase() === 'admin' ? '/admin' : '/'" routerLinkActive="bottom-nav__item--active" [routerLinkActiveOptions]="{ exact: true }">
    <span class="material-symbols-outlined">home</span>
    <span class="bottom-nav__label">Home</span>
  </a>
  <a class="bottom-nav__item" routerLink="/search" routerLinkActive="bottom-nav__item--active">
    <span class="material-symbols-outlined">search</span>
    <span class="bottom-nav__label">Search</span>
  </a>
  <div class="bottom-nav__sell-wrapper">
    <a class="bottom-nav__sell-btn" routerLink="/post-ad" aria-label="Post an ad">
      <span class="material-symbols-outlined">add</span>
    </a>
  </div>
  <a class="bottom-nav__item" routerLink="/chat" routerLinkActive="bottom-nav__item--active">
    <span class="material-symbols-outlined">forum</span>
    <span class="bottom-nav__label">Chat</span>
  </a>
  <a class="bottom-nav__item" routerLink="/profile" routerLinkActive="bottom-nav__item--active">
    <span class="material-symbols-outlined">person</span>
    <span class="bottom-nav__label">Profile</span>
  </a>
</nav>
